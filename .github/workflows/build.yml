name: Build Binaries (CLI-only)

on:
  workflow_dispatch:
    inputs:
      targets:
        description: "Build targets (comma-separated: windows, linux, mac)"
        required: false
        default: "windows, linux, mac"

jobs:
  # ────────────────────────────────────────────────────────────
  build-windows:
    name: Build, Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache pip packages, invalidates when requirements.txt changes.
      # yt-dlp updates frequently, so the weekly date segment forces a
      # fresh install once a week while still saving time on reruns.
      - name: Cache pip (Windows)
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: pip-win-${{ hashFiles('requirements.txt') }}-${{ env.CACHE_WEEK }}
          restore-keys: |
            pip-win-${{ hashFiles('requirements.txt') }}-
            pip-win-
        env:
          CACHE_WEEK: ${{ steps.date.outputs.week }}

      - name: Get current week (for cache rotation)
        id: date
        run: echo "week=$(Get-Date -UFormat '%Y-%V')" >> $env:GITHUB_OUTPUT

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller pillow

      # Cache PyInstaller bootloader/hooks, keyed on Python + PyInstaller version
      - name: Cache PyInstaller
        uses: actions/cache@v4
        with:
          path: ~\AppData\Roaming\pyinstaller
          key: pyinstaller-win-py3.12-${{ hashFiles('requirements.txt') }}
          restore-keys: pyinstaller-win-py3.12-

      - name: Build
        run: >
          python -m PyInstaller
          --noconfirm --onedir --clean --noupx
          --icon=icon.png
          --exclude-module pycryptodomex.selftest
          --exclude-module pycryptodomex.tests
          --name "vid-dl"
          cli.py

      - name: Zip portable output
        run: Compress-Archive -Path "dist\vid-dl" -DestinationPath "Windows_x64-portable.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-Windows
          path: Windows_x64-portable.zip

  # ────────────────────────────────────────────────────────────
  build-linux:
    name: Build, Linux (dir)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get current week (for cache rotation)
        id: date
        run: echo "week=$(date +'%Y-%V')" >> $GITHUB_OUTPUT

      # Cache pip, same weekly-rotation strategy as Windows
      - name: Cache pip (Linux)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-linux-${{ hashFiles('requirements.txt') }}-${{ steps.date.outputs.week }}
          restore-keys: |
            pip-linux-${{ hashFiles('requirements.txt') }}-
            pip-linux-

      # Cache apt packages list
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: apt-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}
          restore-keys: apt-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxcb-xinerama0 libxcb-cursor0 libgl1 libegl1 \
            libdbus-1-3 libxkbcommon-x11-0 \

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      # ── 1. PyInstaller build ─────────────────────────────────
      - name: PyInstaller build
        run: |
          python -m PyInstaller \
            --noconfirm --onedir --clean --noupx \
            --icon=icon.png \
            --exclude-module pycryptodomex.selftest \
            --exclude-module pycryptodomex.tests \
            --name "vid-dl" \
            cli.py

      - name: Zip portable output
        run: |
          mkdir -p zip_out
          cp -r "dist/vid-dl" "zip_out/vid-dl"
          cd zip_out
          zip -r "../Linux_x64-portable.zip" "vid-dl"

      - name: Upload plain Linux dir
        uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-Linux
          path: Linux_x64-portable.zip

  # ────────────────────────────────────────────────────────────
  build-mac:
    name: Build, macOS universal (.app portable zip)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get current week (for cache rotation)
        id: date
        run: echo "week=$(date +'%Y-%V')" >> $GITHUB_OUTPUT

      - name: Cache pip (macOS)
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: pip-mac-${{ hashFiles('requirements.txt') }}-${{ steps.date.outputs.week }}
          restore-keys: |
            pip-mac-${{ hashFiles('requirements.txt') }}-
            pip-mac-

      - name: Cache PyInstaller (macOS)
        uses: actions/cache@v4
        with:
          path: ~/Library/Application Support/pyinstaller
          key: pyinstaller-mac-universal2-py3.12-${{ hashFiles('requirements.txt') }}
          restore-keys: pyinstaller-mac-universal2-py3.12-

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller pillow

      # ── PyInstaller build ────────────────────────────────────
      # universal2 = single .app that runs natively on both Apple Silicon and Intel
      - name: Build .app bundle (universal2)
        run: |
          python -m PyInstaller \
            --noconfirm --onedir --clean --noupx \
            --icon=icon.png \
            --exclude-module pycryptodomex.selftest \
            --exclude-module pycryptodomex.tests \
            --target-arch universal2 \
            --name "vid-dl" \
            cli.py

      - name: Zip portable output (ditto)
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/vid-dl.app" \
            "macOS_universal2-portable.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: VideoDownloader-macOS
          path: macOS_universal2-portable.zip
